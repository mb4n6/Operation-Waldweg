<svg viewBox="0 0 920 430" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif" role="img" aria-labelledby="t d">
  <title id="t">CaseForge — agentische Arbeitsteilung</title>
  <desc id="d">Der LLM-Agent entwirft den Fall als schema-konformes Spezifikat, ein Mensch verifiziert ihn verpflichtend, deterministische Generatoren projizieren die zentrale Wahrheit in Originalformat-Artefakte, und reale Forensiktools validieren sie als Abnahme-Gate. Das Ganze ist von Ethik-Leitplanken umgeben.</desc>

  <rect x="0" y="0" width="920" height="430" fill="#ffffff"/>

  <!-- Ethics guardrail frame -->
  <rect x="20" y="58" width="880" height="252" rx="16" fill="none" stroke="#b5482f" stroke-width="1.2" stroke-dasharray="2 5" opacity="0.85"/>
  <text x="36" y="80" font-size="11" font-weight="700" letter-spacing="0.4" fill="#b5482f">ETHIK-LEITPLANKEN · synthetic_training_data_only</text>

  <!-- role band labels -->
  <text x="110" y="106" text-anchor="middle" font-size="10.5" font-weight="700" letter-spacing="0.5" fill="#b5482f">AGENT (LLM)</text>
  <text x="330" y="106" text-anchor="middle" font-size="10.5" font-weight="700" letter-spacing="0.5" fill="#b5482f">MENSCH</text>
  <text x="660" y="106" text-anchor="middle" font-size="10.5" font-weight="700" letter-spacing="0.5" fill="#6b7280">GEPRÜFTER, DETERMINISTISCHER CODE</text>

  <!-- arrows -->
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>
  <line x1="192" y1="186" x2="248" y2="186" stroke="#6b7280" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="412" y1="186" x2="468" y2="186" stroke="#6b7280" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="632" y1="186" x2="688" y2="186" stroke="#6b7280" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Stage 1 PROPOSE (agent) -->
  <rect x="32" y="120" width="160" height="128" rx="12" fill="#fdf6f4" stroke="#b5482f" stroke-width="2"/>
  <text x="112" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2328">1 · PROPOSE</text>
  <text x="112" y="174" text-anchor="middle" font-size="11.5" fill="#5b6068">Fall-Spec (JSON)</text>
  <text x="112" y="194" text-anchor="middle" font-size="11.5" fill="#5b6068">Plot · Personen · Timeline</text>
  <text x="112" y="214" text-anchor="middle" font-size="11.5" fill="#5b6068">geplante Widersprüche</text>
  <text x="112" y="234" text-anchor="middle" font-size="10.5" font-style="italic" fill="#8a8f97">Modell schlägt vor</text>

  <!-- Stage 2 REVIEW (human) -->
  <rect x="252" y="120" width="160" height="128" rx="12" fill="#ffffff" stroke="#b5482f" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="332" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2328">2 · REVIEW</text>
  <text x="332" y="176" text-anchor="middle" font-size="11.5" fill="#5b6068">verifizieren /</text>
  <text x="332" y="196" text-anchor="middle" font-size="11.5" fill="#5b6068">justieren / freigeben</text>
  <text x="332" y="224" text-anchor="middle" font-size="11" font-weight="700" fill="#b5482f">PFLICHT-SCHRITT</text>

  <!-- Stage 3 BUILD -->
  <rect x="472" y="120" width="160" height="128" rx="12" fill="#ffffff" stroke="#c9ccd1" stroke-width="1.5"/>
  <text x="552" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2328">3 · BUILD</text>
  <text x="552" y="176" text-anchor="middle" font-size="11.5" fill="#5b6068">deterministische</text>
  <text x="552" y="196" text-anchor="middle" font-size="11.5" fill="#5b6068">Generatoren</text>
  <text x="552" y="216" text-anchor="middle" font-size="11" fill="#5b6068">SQLite · plist · regf</text>
  <text x="552" y="234" text-anchor="middle" font-size="11" fill="#5b6068">EVTX · $MFT · ABX</text>

  <!-- Stage 4 VALIDATE -->
  <rect x="692" y="120" width="160" height="128" rx="12" fill="#ffffff" stroke="#c9ccd1" stroke-width="1.5"/>
  <text x="772" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2328">4 · VALIDATE</text>
  <text x="772" y="176" text-anchor="middle" font-size="11.5" fill="#5b6068">reale Forensiktools</text>
  <text x="772" y="196" text-anchor="middle" font-size="11" fill="#5b6068">iLEAPP · ALEAPP</text>
  <text x="772" y="216" text-anchor="middle" font-size="11" fill="#5b6068">regipy · python-evtx</text>
  <text x="772" y="234" text-anchor="middle" font-size="10.5" font-style="italic" fill="#8a8f97">Abnahme-Gate</text>

  <!-- single source of truth note -->
  <text x="460" y="292" text-anchor="middle" font-size="11.5" fill="#5b6068">case_master.yaml — <tspan font-style="italic">eine Wahrheit, viele Projektionen</tspan></text>

  <!-- property chips -->
  <g font-size="11" font-weight="600" fill="#1f2328">
    <rect x="32" y="338" width="250" height="32" rx="16" fill="#f5f6f8" stroke="#e1e3e7"/>
    <circle cx="52" cy="354" r="4.5" fill="#1f2328"/>
    <text x="64" y="358">modellunabhängige Datenqualität</text>

    <rect x="296" y="338" width="232" height="32" rx="16" fill="#f5f6f8" stroke="#e1e3e7"/>
    <circle cx="316" cy="354" r="4.5" fill="#1f2328"/>
    <text x="328" y="358">seed = bit-stabil reproduzierbar</text>

    <rect x="542" y="338" width="310" height="32" rx="16" fill="#f5f6f8" stroke="#e1e3e7"/>
    <circle cx="562" cy="354" r="4.5" fill="#b5482f"/>
    <text x="574" y="358">Realitätsnähe tool-belegt, nicht behauptet</text>
  </g>

  <!-- legend -->
  <g font-size="10.5" fill="#6b7280">
    <rect x="32" y="396" width="13" height="13" rx="3" fill="#fdf6f4" stroke="#b5482f" stroke-width="2"/>
    <text x="51" y="406">Agent entwirft</text>
    <rect x="172" y="396" width="13" height="13" rx="3" fill="#ffffff" stroke="#b5482f" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="191" y="406">Mensch verifiziert (verpflichtend)</text>
    <rect x="392" y="396" width="13" height="13" rx="3" fill="#ffffff" stroke="#c9ccd1" stroke-width="1.5"/>
    <text x="411" y="406">geprüfter Code erzeugt &amp; validiert</text>
  </g>
</svg>
